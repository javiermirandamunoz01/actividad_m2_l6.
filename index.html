<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio jQuery - Proyecto Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { padding: 40px; font-family: sans-serif; background-color: #f4f4f4; }
        .contenedor-lista { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        #carruselDeporte img { border-radius: 8px; max-height: 400px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="carruselDeporte" class="carousel slide mb-4 shadow" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/assets/img/discover-the-beauty-of-trekking.jpg" class="d-block w-100" alt="Gimnasio">
            </div>
            <div class="carousel-item">
                <img src="/assets/img/descarga.jpg" class="d-block w-100" alt="Yoga">
            </div>
            <div class="carousel-item">
                <img src="/assets/img/descarga (1).jpg" class="d-block w-100" alt="Running">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carruselDeporte" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carruselDeporte" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="contenedor-lista shadow-sm">
        <h3>Beneficios de hacer deporte</h3>
        <ul id="miLista">
            <li>Mejora tu condición física</li>
            <li>Mejora tu salud</li>
            <li>Mejora tu aspecto físico</li>
        </ul>

        <button id="btnModificar" class="btn btn-primary">Ocultar Lista</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function () {
            
           
            $('#miLista').append('<li>Mejora la salud mental</li>');
            $('#miLista li').css('color', 'red');

           
            $('#btnModificar').click(function () {
                $('#miLista').toggle(400); 
                if ($('#miLista').is(':visible')) {
                    $(this).text('Ocultar Lista').removeClass('btn-success').addClass('btn-primary');
                } else {
                    $(this).text('Mostrar Lista').removeClass('btn-primary').addClass('btn-success');
                }
            });

           
            $('#carruselDeporte').carousel({
                interval: 3000,
                pause: "hover"
            });
        });
    </script>
</body>
</html>
